<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>海外内容运营 AI 面板（合规版）</title>
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --error-color: #ef4444;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #8b5cf6 100%);
            color: white;
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
        }
        
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header-content h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        
        .status-badge {
            padding: 0.375rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 500;
        }
        
        .status-online {
            background-color: rgba(16, 185, 129, 0.2);
            color: #d1fae5;
        }
        
        .status-offline {
            background-color: rgba(251, 191, 36, 0.2);
            color: #fef3c7;
        }
        
        /* Tabs */
        .tabs-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background-color: white;
        }
        
        .tabs {
            display: flex;
            gap: 0.25rem;
            overflow-x: auto;
            scrollbar-width: none;
        }
        
        .tabs::-webkit-scrollbar {
            display: none;
        }
        
        .tab {
            padding: 0.75rem 1.25rem;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        
        .tab:hover {
            background-color: var(--bg-color);
        }
        
        .tab.active {
            background-color: var(--primary-color);
            color: white;
        }
        
        /* Main Content */
        .main-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }
        
        /* Card */
        .card {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        
        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        /* Form Elements */
        .form-group {
            margin-bottom: 1rem;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            background-color: white;
            color: var(--text-primary);
            transition: border-color 0.2s ease;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        .btn {
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        
        .btn-primary:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }
        
        .btn-secondary {
            background-color: var(--bg-color);
            color: var(--text-primary);
        }
        
        .btn-secondary:hover {
            background-color: var(--border-color);
        }
        
        .btn-sm {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .btn-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        
        /* Loading State */
        .loading {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .spinner {
            width: 1.25rem;
            height: 1.25rem;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Status Messages */
        .status-message {
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }
        
        .status-success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
        }
        
        .status-warning {
            background-color: rgba(245, 158, 11, 0.1);
            color: var(--warning-color);
        }
        
        .status-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
        }
        
        /* Result Cards */
        .result-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .result-card {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        
        .result-card-header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #8b5cf6 100%);
            color: white;
            padding: 1rem;
        }
        
        .result-card-title {
            font-size: 1rem;
            font-weight: 600;
        }
        
        .result-card-body {
            padding: 1rem;
        }
        
        .result-card-section {
            margin-bottom: 1rem;
        }
        
        .result-card-section:last-child {
            margin-bottom: 0;
        }
        
        .result-card-section-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }
        
        .result-card-text {
            font-size: 0.875rem;
            color: var(--text-primary);
            line-height: 1.5;
        }
        
        .result-card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.375rem;
        }
        
        .tag {
            padding: 0.25rem 0.5rem;
            background-color: var(--bg-color);
            border-radius: 9999px;
            font-size: 0.75rem;
            color: var(--text-secondary);
        }
        
        /* Dashboard */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .dashboard-item {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.25rem;
            text-align: center;
            box-shadow: var(--shadow);
        }
        
        .dashboard-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        
        .dashboard-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }
        
        .dashboard-positive {
            color: var(--success-color);
        }
        
        .dashboard-neutral {
            color: var(--warning-color);
        }
        
        .dashboard-negative {
            color: var(--error-color);
        }
        
        /* Keywords */
        .keywords-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        
        .keyword-item {
            padding: 0.5rem 0.75rem;
            background-color: var(--bg-color);
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        /* Calendar */
        .calendar-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        
        .calendar-item {
            background-color: var(--card-bg);
            border-radius: var(--radius);
            padding: 1rem;
            box-shadow: var(--shadow);
            display: flex;
            gap: 1rem;
        }
        
        .calendar-date {
            background: linear-gradient(135deg, var(--primary-color) 0%, #8b5cf6 100%);
            color: white;
            padding: 0.75rem;
            border-radius: var(--radius-sm);
            text-align: center;
            min-width: 70px;
        }
        
        .calendar-date-day {
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .calendar-date-month {
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        
        .calendar-content {
            flex: 1;
        }
        
        .calendar-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .calendar-desc {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }
        
        /* Dialog */
        .dialog-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
        }
        
        .dialog-overlay.open {
            display: flex;
        }
        
        .dialog {
            background-color: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .dialog-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .dialog-title {
            font-size: 1.125rem;
            font-weight: 600;
        }
        
        .dialog-close {
            background: none;
            border: none;
            font-size: 1.25rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 0.25rem;
            border-radius: var(--radius-sm);
        }
        
        .dialog-close:hover {
            background-color: var(--bg-color);
        }
        
        .dialog-body {
            padding: 1.5rem;
        }
        
        .dialog-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }
        
        /* Responsive */
        @media (max-width: 640px) {
            header {
                padding: 1rem;
            }
            
            .header-content h1 {
                font-size: 1.25rem;
            }
            
            .main-content {
                padding: 1rem;
            }
            
            .tabs-container {
                padding: 0.75rem 1rem;
            }
            
            .tab {
                padding: 0.5rem 0.75rem;
                font-size: 0.8rem;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>海外内容运营 AI 面板</h1>
            <div class="header-right">
                <span id="connection-status" class="status-badge status-offline">离线模式</span>
                <button id="settings-btn" class="btn btn-secondary btn-sm" style="margin-left: 0.75rem;">⚙️ 配置</button>
            </div>
        </div>
    </header>

    <div class="tabs-container">
        <div class="tabs">
            <button class="tab active" data-tab="script">📝 脚本灵感</button>
            <button class="tab" data-tab="emotion">🎭 情绪翻译官</button>
            <button class="tab" data-tab="competitor">🎯 竞品弱点雷达</button>
            <button class="tab" data-tab="calendar">📅 本土化热点日历</button>
        </div>
    </div>

    <div class="main-content">
        <!-- 脚本灵感模块 -->
        <div id="script-tab" class="tab-content">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">TikTok 脚本生成</h2>
                    <span id="script-mode" class="status-badge status-warning">使用本地模板</span>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>目标国家</label>
                        <select id="script-country">
                            <option value="US">美国</option>
                            <option value="MX">墨西哥</option>
                            <option value="JP">日本</option>
                            <option value="GB">英国</option>
                            <option value="DE">德国</option>
                            <option value="FR">法国</option>
                            <option value="AU">澳大利亚</option>
                            <option value="KR">韩国</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>产品品类</label>
                        <select id="script-category">
                            <option value="beauty">美妆</option>
                            <option value="3c">3C数码</option>
                            <option value="toy">玩具</option>
                            <option value="home">家居</option>
                            <option value="fashion">服饰</option>
                            <option value="food">食品</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>生成条数</label>
                        <select id="script-count">
                            <option value="3">3条</option>
                            <option value="5">5条</option>
                            <option value="8">8条</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>风格</label>
                        <select id="script-style">
                            <option value="review">实用测评</option>
                            <option value="contrast">反差剧情</option>
                            <option value="tutorial">教程教学</option>
                            <option value="unboxing">开箱体验</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>生成方式</label>
                        <select id="script-method">
                            <option value="ai">优先大模型</option>
                            <option value="local">只用本地模板</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>口吻</label>
                        <select id="script-tone">
                            <option value="casual">更口语</option>
                            <option value="professional">更专业</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>额外要求（可选）</label>
                    <input type="text" id="script-extra" placeholder="例如：突出产品性价比，面向年轻女性用户">
                </div>
                <div class="btn-group">
                    <button id="script-generate" class="btn btn-primary">
                        <span>✨ 生成脚本</span>
                    </button>
                    <button id="script-copy-all" class="btn btn-secondary" disabled>
                        <span>📋 复制全部</span>
                    </button>
                </div>
            </div>
            
            <div id="script-results"></div>
        </div>

        <!-- 情绪翻译官模块 -->
        <div id="emotion-tab" class="tab-content" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">评论情绪分析</h2>
                    <span id="emotion-mode" class="status-badge status-warning">使用本地模板</span>
                </div>
                <div class="form-group">
                    <label>粘贴评论区文本（每行一条）</label>
                    <textarea id="emotion-input" placeholder="用户评论1&#10;用户评论2&#10;用户评论3..."></textarea>
                </div>
                <button id="emotion-analyze" class="btn btn-primary">
                    <span>🔍 分析情绪</span>
                </button>
            </div>
            
            <div id="emotion-results"></div>
        </div>

        <!-- 竞品弱点雷达模块 -->
        <div id="competitor-tab" class="tab-content" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">竞品弱点分析</h2>
                    <span id="competitor-mode" class="status-badge status-warning">使用本地模板</span>
                </div>
                <div class="form-group">
                    <label>粘贴竞品的评论/评测文本</label>
                    <textarea id="competitor-input" placeholder="竞品评论1&#10;竞品评论2&#10;竞品评测内容..."></textarea>
                </div>
                <button id="competitor-analyze" class="btn btn-primary">
                    <span>🎯 分析弱点</span>
                </button>
            </div>
            
            <div id="competitor-results"></div>
        </div>

        <!-- 本土化热点日历模块 -->
        <div id="calendar-tab" class="tab-content" style="display: none;">
            <div class="card">
                <div class="card-header">
                    <h2 class="card-title">营销主题日历</h2>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>目标国家</label>
                        <select id="calendar-country">
                            <option value="US">美国</option>
                            <option value="MX">墨西哥</option>
                            <option value="JP">日本</option>
                            <option value="GB">英国</option>
                            <option value="DE">德国</option>
                            <option value="FR">法国</option>
                            <option value="AU">澳大利亚</option>
                            <option value="KR">韩国</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>产品品类</label>
                        <select id="calendar-category">
                            <option value="beauty">美妆</option>
                            <option value="3c">3C数码</option>
                            <option value="toy">玩具</option>
                            <option value="home">家居</option>
                            <option value="fashion">服饰</option>
                            <option value="food">食品</option>
                        </select>
                    </div>
                </div>
                <button id="calendar-generate" class="btn btn-primary">
                    <span>📅 生成日历</span>
                </button>
            </div>
            
            <div id="calendar-results"></div>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div id="settings-dialog" class="dialog-overlay">
        <div class="dialog">
            <div class="dialog-header">
                <h3 class="dialog-title">API 配置</h3>
                <button id="dialog-close" class="dialog-close">×</button>
            </div>
            <div class="dialog-body">
                <div class="form-group">
                    <label>Endpoint URL</label>
                    <input type="text" id="api-endpoint" placeholder="https://api.openai.com/v1/chat/completions">
                </div>
                <div class="form-group">
                    <label>Model 名称</label>
                    <input type="text" id="api-model" placeholder="gpt-3.5-turbo">
                </div>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="password" id="api-key" placeholder="sk-...">
                </div>
                <div id="api-status" class="status-message status-warning" style="display: none;">
                    未配置 API，当前使用本地模板模式
                </div>
            </div>
            <div class="dialog-footer">
                <button id="api-clear" class="btn btn-secondary btn-sm">清除存储</button>
                <button id="api-test" class="btn btn-secondary btn-sm">测试连接</button>
                <button id="api-save" class="btn btn-primary btn-sm">保存配置</button>
            </div>
        </div>
    </div>

    <script>
        // 内置数据 - 节日和场景
        const holidayData = {
            US: [
                { month: 1, day: 1, name: '新年', theme: 'New Year', category: 'holiday' },
                { month: 2, day: 14, name: '情人节', theme: 'Valentine', category: 'holiday' },
                { month: 3, day: 17, name: '圣帕特里克节', theme: 'St. Patrick', category: 'holiday' },
                { month: 4, name: '复活节', theme: 'Easter', category: 'holiday' },
                { month: 5, day: 10, name: '母亲节', theme: 'Mother Day', category: 'holiday' },
                { month: 6, day: 16, name: '父亲节', theme: 'Father Day', category: 'holiday' },
                { month: 7, day: 4, name: '独立日', theme: '4th of July', category: 'holiday' },
                { month: 9, name: '劳动节', theme: 'Labor Day', category: 'holiday' },
                { month: 10, day: 31, name: '万圣节', theme: 'Halloween', category: 'holiday' },
                { month: 11, day: 11, name: '退伍军人节', theme: 'Veterans Day', category: 'holiday' },
                { month: 11, name: '感恩节', theme: 'Thanksgiving', category: 'holiday' },
                { month: 12, day: 25, name: '圣诞节', theme: 'Christmas', category: 'holiday' }
            ],
            MX: [

        }

        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }

        // API 配置管理
        const configKeys = ['apiEndpoint', 'apiModel', 'apiKey'];

        function loadConfig() {
            const config = {};
            configKeys.forEach(key => {
                config[key] = localStorage.getItem(key) || '';
            });
            return config;
        }

        function saveConfig(config) {
            configKeys.forEach(key => {
                if (config[key]) {
                    localStorage.setItem(key, config[key]);
                } else {
                    localStorage.removeItem(key);
                }
            });
        }

        function clearConfig() {
            configKeys.forEach(key => localStorage.removeItem(key));
        }

        function hasValidConfig() {
            const config = loadConfig();
            return config.apiEndpoint && config.apiKey && config.apiModel;
        }

        async function callAI(prompt, config) {
            try {
                const response = await fetch(config.apiEndpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${config.apiKey}`
                    },
                    body: JSON.stringify({
                        model: config.apiModel,
                        messages: [{ role: 'user', content: prompt }],
                        temperature: 0.7,
                        max_tokens: 2000
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }
                
                const data = await response.json();
                return data.choices[0].message.content;
            } catch (error) {
                console.error('AI call failed:', error);
                return null;
            }
        }

        // 本地情绪分析
        function analyzeLocalEmotions(text) {
            const lines = text.split('\n').filter(line => line.trim());
            if (lines.length === 0) return null;
            
            let positive = 0;
            let negative = 0;
            let neutral = 0;
            const positiveKeywords = [];
            const negativeKeywords = [];
            
            lines.forEach(line => {
                const lowerLine = line.toLowerCase();
                let hasPositive = false;
                let hasNegative = false;
                
                emotionWords.positive.forEach(word => {
                    if (lowerLine.includes(word) && !hasPositive) {
                        hasPositive = true;
                        if (!positiveKeywords.includes(word)) positiveKeywords.push(word);
                    }
                });
                
                emotionWords.negative.forEach(word => {
                    if (lowerLine.includes(word) && !hasNegative) {
                        hasNegative = true;
                        if (!negativeKeywords.includes(word)) negativeKeywords.push(word);
                    }
                });
                
                if (hasPositive && !hasNegative) positive++;
                else if (hasNegative && !hasPositive) negative++;
                else if (hasPositive && hasNegative) neutral++;
                else neutral++;
            });
            
            const total = lines.length;
            const suggestions = [];
            
            if (positive > negative) {
                suggestions.push('用户整体反馈积极，可以加大推广力度');
                suggestions.push('收集好评关键词用于营销素材');
            } else if (negative > positive) {
                suggestions.push('需要关注用户痛点，改进产品或服务');
                suggestions.push('针对负面评价进行回复和处理');
            } else {
                suggestions.push('用户反馈中性，需要进一步了解需求');
                suggestions.push('可以通过互动提升用户参与度');
            }
            
            return {
                positive: Math.round((positive / total) * 100),
                neutral: Math.round((neutral / total) * 100),
                negative: Math.round((negative / total) * 100),
                positiveKeywords: positiveKeywords.slice(0, 8),
                negativeKeywords: negativeKeywords.slice(0, 8),
                suggestions
            };
        }

                statusEl.className = 'status-badge status-online';
            } else {
                statusEl.textContent = '离线模式';
                statusEl.className = 'status-badge status-offline';
            }
            
            // 更新各模块的模式提示
            ['script', 'emotion', 'competitor'].forEach(module => {
                const el = document.getElementById(`${module}-mode`);
                if (el) {
                    el.textContent = isOnline ? '使用大模型' : '使用本地模板';
                    el.className = `status-badge ${isOnline ? 'status-success' : 'status-warning'}`;
                }
            });
        }

        function renderScriptResults(scripts) {
            const container = document.getElementById('script-results');
            if (!scripts || scripts.length === 0) {
                container.innerHTML = '<div class="status-message status-error">生成失败，请重试</div>';
                return;
            }
            
            let html = '<div class="result-container">';
            scripts.forEach((script, index) => {
                html += `
                    <div class="result-card">
                        <div class="result-card-header">
                            <div class="result-card-title">脚本 ${index + 1}: ${script.title}</div>
                        </div>
                        <div class="result-card-body">
                            <div class="result-card-section">
                                <div class="result-card-section-title">结构模型</div>
                                <div class="result-card-text">${script.structure}</div>
                            </div>
                            ${script.scenes.map(scene => `
                                <div class="result-card-section">
                                    <div class="result-card-section-title">${scene.time}</div>
                                    <div class="result-card-text">${scene.content}</div>
                                </div>
                            `).join('')}
                            <div class="result-card-section">
                                <div class="result-card-section-title">配音文案</div>
                                <div class="result-card-text">${script.voiceover}</div>
                            </div>
                            <div class="result-card-section">
                                <div class="result-card-section-title">CTA</div>
                                <div class="result-card-text">${script.cta}</div>
                            </div>
                            <div class="result-card-section">
                                <div class="result-card-section-title">Hashtag</div>
                                <div class="result-card-tags">${script.hashtags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                            </div>
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            
            container.innerHTML = html;
            document.getElementById('script-copy-all').disabled = false;
        }

        function renderEmotionResults(data) {
            const container = document.getElementById('emotion-results');
            if (!data) {
                container.innerHTML = '<div class="status-message status-error">分析失败，请重试</div>';
                return;
            }
            
            const html = `
                <div class="dashboard">
                    <div class="dashboard-item">
                        <div class="dashboard-value dashboard-positive">${data.positive}%</div>
                        <div class="dashboard-label">正面</div>
                    </div>
                    <div class="dashboard-item">
                        <div class="dashboard-value dashboard-neutral">${data.neutral}%</div>
                        <div class="dashboard-label">中性</div>
                    </div>
                    <div class="dashboard-item">
                        <div class="dashboard-value dashboard-negative">${data.negative}%</div>
                        <div class="dashboard-label">负面</div>
                    </div>
                </div>
                <div class="card">
                    <h3 class="card-title">好评关键词</h3>
                    <div class="keywords-list">
                        ${data.positiveKeywords.map(k => `<span class="keyword-item dashboard-positive">✓ ${k}</span>`).join('')}
                    </div>
                </div>
                <div class="card">
                    <h3 class="card-title">槽点关键词</h3>
                    <div class="keywords-list">
                        ${data.negativeKeywords.map(k => `<span class="keyword-item dashboard-negative">✗ ${k}</span>`).join('')}
                    </div>
                </div>
                <div class="card">
                    <h3 class="card-title">行动建议</h3>
                    <ul style="margin-left: 1.5rem; font-size: 0.9rem;">
                        ${data.suggestions.map(s => `<li>${s}</li>`).join('')}
                    </ul>
                </div>
            `;
            
            container.innerHTML = html;
        }

        function renderCompetitorResults(data) {
            const container = document.getElementById('competitor-results');
            if (!data) {
                container.innerHTML = '<div class="status-message status-error">分析失败，请重试</div>';
                return;
            }
            
            const html = `
                <div class="card">
                    <h3 class="card-title">🔴 竞品负面痛点</h3>
                    <ul style="margin-left: 1.5rem;">
                        ${data.painPoints.map(p => `<li style="padding: 0.5rem 0; border-bottom: 1px solid ${window.getComputedStyle(document.documentElement).getPropertyValue('--border-color')};">${p}</li>`).join('')}
                    </ul>
                </div>
                <div class="card">
                    <h3 class="card-title">⚔️ 攻击突破口</h3>
                    <ul style="margin-left: 1.5rem;">
                        ${data.openings.map(o => `<li style="padding: 0.5rem 0;">${o}</li>`).join('')}
                    </ul>
                </div>
                <div class="card">
                    <h3 class="card-title">📊 对比角度</h3>
                    <div class="keywords-list">
                        ${data.angles.map(a => `<span class="keyword-item">${a}</span>`).join('')}
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
        }

        function renderCalendarResults(days) {
            const container = document.getElementById('calendar-results');
            if (!days || days.length === 0) {
                container.innerHTML = '<div class="status-message status-error">生成失败，请重试</div>';
                return;
            }
            
            const html = `
                <div class="calendar-list">
                    ${days.map(day => `
                        <div class="calendar-item">
                            <div class="calendar-date">
                                <div class="calendar-date-day">${day.date.split('月')[1].replace('日', '')}</div>
                                <div class="calendar-date-month">${day.date.split('月')[0]}月</div>
                            </div>
                            <div class="calendar-content">
                                <div class="calendar-title">${day.dayName} · ${day.theme}</div>
                                <div class="calendar-desc">${day.contentAngle}</div>
                                <div class="result-card-tags">${day.hashtags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            
            container.innerHTML = html;
        }

        // Tab 切换
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                
                const tabId = tab.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(content => {
                    content.style.display = 'none';
                });
                document.getElementById(`${tabId}-tab`).style.display = 'block';
            });
        });

        // 设置弹窗
        const settingsDialog = document.getElementById('settings-dialog');
        document.getElementById('settings-btn').addEventListener('click', () => {
            settingsDialog.classList.add('open');
            const config = loadConfig();
            document.getElementById('api-endpoint').value = config.apiEndpoint;
            document.getElementById('api-model').value = config.apiModel;
            document.getElementById('api-key').value = config.apiKey;
            document.getElementById('api-status').style.display = hasValidConfig() ? 'none' : 'block';
        });

        document.getElementById('dialog-close').addEventListener('click', () => {
            settingsDialog.classList.remove('open');
        });

        document.getElementById('api-save').addEventListener('click', () => {
            const config = {
                apiEndpoint: document.getElementById('api-endpoint').value,
                apiModel: document.getElementById('api-model').value,
                apiKey: document.getElementById('api-key').value
            };
            saveConfig(config);
            updateConnectionStatus();
            document.getElementById('api-status').style.display = hasValidConfig() ? 'none' : 'block';
            alert('配置已保存！');
        });

        document.getElementById('api-clear').addEventListener('click', () => {
            if (confirm('确定要清除所有配置吗？')) {
                clearConfig();
                document.getElementById('api-endpoint').value = '';
                document.getElementById('api-model').value = '';
                document.getElementById('api-key').value = '';
                updateConnectionStatus();
                document.getElementById('api-status').style.display = 'block';
            }
        });

        document.getElementById('api-test').addEventListener('click', async () => {
            const config = loadConfig();
            if (!config.apiEndpoint || !config.apiKey || !config.apiModel) {
                alert('请先填写完整的配置信息');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 测试中...';
            
            const result = await callAI('Hello, just test connection', config);
            
            btn.disabled = false;
            btn.innerHTML = '测试连接';
            
            if (result) {
                alert('连接成功！');
            } else {
                alert('连接失败，请检查配置');
            }
        });

        // 脚本生成
        document.getElementById('script-generate').addEventListener('click', async () => {
            const country = document.getElementById('script-country').value;
            const category = document.getElementById('script-category').value;
            const count = parseInt(document.getElementById('script-count').value);
            const style = document.getElementById('script-style').value;
            const method = document.getElementById('script-method').value;
            const tone = document.getElementById('script-tone').value;
            const extra = document.getElementById('script-extra').value;
            
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 生成中...';
            
            document.getElementById('script-results').innerHTML = '';
            
            let scripts = null;
            const useAI = method === 'ai' && hasValidConfig();
            
            if (useAI) {
                const config = loadConfig();
                const prompt = `请帮我生成${count}条TikTok脚本，目标国家：${country}，产品品类：${category}，风格：${style === 'review' ? '实用测评' : style === 'contrast' ? '反差剧情' : style === 'tutorial' ? '教程教学' : '开箱体验'}，口吻：${tone === 'casual' ? '口语化' : '专业'}。每条脚本需要包含：标题、结构模型、三个时间段的镜头描述（0-5秒/6-22秒/23-40秒）、配音文案、CTA、hashtag。${extra ? `额外要求：${extra}` : ''}请用JSON格式输出。`;
                const result = await callAI(prompt, config);
                try {
                    scripts = JSON.parse(result);
                } catch (e) {
                    console.error('AI response parse error:', e);
                }
            }
            
            if (!scripts) {
                scripts = generateLocalScripts(country, category, count, style, tone);
            }
            
            renderScriptResults(scripts);
            
            btn.disabled = false;
            btn.innerHTML = '✨ 生成脚本';
        });

        // 复制脚本
        document.getElementById('script-copy-all').addEventListener('click', () => {
            const cards = document.querySelectorAll('.result-card');
            let text = '';
            cards.forEach((card, index) => {
                text += `=== 脚本 ${index + 1} ===\n`;
                text += `标题：${card.querySelector('.result-card-title').textContent.replace(`脚本 ${index + 1}: `, '')}\n`;
                text += `结构模型：${card.querySelectorAll('.result-card-text')[0].textContent}\n`;
                text += `0-5秒：${card.querySelectorAll('.result-card-text')[1].textContent}\n`;
                text += `6-22秒：${card.querySelectorAll('.result-card-text')[2].textContent}\n`;
                text += `23-40秒：${card.querySelectorAll('.result-card-text')[3].textContent}\n`;
                text += `配音文案：${card.querySelectorAll('.result-card-text')[4].textContent}\n`;
                text += `CTA：${card.querySelectorAll('.result-card-text')[5].textContent}\n`;
                text += `Hashtag：${card.querySelector('.result-card-tags').textContent}\n\n`;
            });
            
            navigator.clipboard.writeText(text).then(() => {
                alert('所有脚本已复制到剪贴板！');
            }).catch(err => {
                console.error('复制失败:', err);
            });
        });

        // 情绪分析
        document.getElementById('emotion-analyze').addEventListener('click', async () => {
            const input = document.getElementById('emotion-input').value;
            if (!input.trim()) {
                alert('请输入评论文本');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 分析中...';
            
            document.getElementById('emotion-results').innerHTML = '';
            
            let result = null;
            const useAI = hasValidConfig();
            
            if (useAI) {
                const config = loadConfig();
                const prompt = `请分析以下评论的情绪：\n\n${input}\n\n请输出：1) 正面/中性/负面情绪百分比 2) 好评关键词 3) 槽点关键词 4) 行动建议。用JSON格式输出。`;
                const aiResult = await callAI(prompt, config);
                try {
                    result = JSON.parse(aiResult);
                } catch (e) {
                    console.error('AI response parse error:', e);
                }
            }
            
            if (!result) {
                result = analyzeLocalEmotions(input);
            }
            
            renderEmotionResults(result);
            
            btn.disabled = false;
            btn.innerHTML = '🔍 分析情绪';
        });

        // 竞品分析
        document.getElementById('competitor-analyze').addEventListener('click', async () => {
            const input = document.getElementById('competitor-input').value;
            if (!input.trim()) {
                alert('请输入竞品评论/评测文本');
                return;
            }
            
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 分析中...';
            
            document.getElementById('competitor-results').innerHTML = '';
            
            let result = null;
            const useAI = hasValidConfig();
            
            if (useAI) {
                const config = loadConfig();
                const prompt = `请分析以下竞品评论/评测，找出其负面痛点和攻击突破口：\n\n${input}\n\n请输出：1) 负面痛点列表 2) 攻击突破口 3) 对比角度。用JSON格式输出。`;
                const aiResult = await callAI(prompt, config);
                try {
                    result = JSON.parse(aiResult);
                } catch (e) {
                    console.error('AI response parse error:', e);
                }
            }
            
            if (!result) {
                result = analyzeLocalCompetitor(input);
            }
            
            renderCompetitorResults(result);
            
            btn.disabled = false;
            btn.innerHTML = '🎯 分析弱点';
        });

        // 日历生成
        document.getElementById('calendar-generate').addEventListener('click', () => {
            const country = document.getElementById('calendar-country').value;
            const category = document.getElementById('calendar-category').value;
            
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> 生成中...';
            
            document.getElementById('calendar-results').innerHTML = '';
            
            const days = generateLocalCalendar(country, category);
            renderCalendarResults(days);
            
            btn.disabled = false;
            btn.innerHTML = '📅 生成日历';
        });

        // 初始化
        updateConnectionStatus();
        
        // 点击弹窗外部关闭
        settingsDialog.addEventListener('click', (e) => {
            if (e.target === settingsDialog) {
                settingsDialog.classList.remove('open');
            }
        });
    </script>
</body>
</html>
